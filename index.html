<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-CARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans text-white relative">

    <div id="main-menu" class="bg-slate-800 border border-slate-700 rounded-xl p-10 shadow-2xl max-w-md w-full text-center relative">
        
        <a id="main-btn-manual" href="manuale_it.pdf" target="_blank" 
           class="absolute top-4 right-4 bg-slate-700 hover:bg-slate-600 text-white text-xs px-3 py-2 rounded-lg font-bold transition">
            Istruzioni / Instructions
        </a>

        <h1 class="text-4xl font-extrabold text-cyan-400 mb-8 mt-6">CC-CARE</h1>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="selectTool('REGISTRAZIONE')" class="bg-slate-700 hover:bg-cyan-900 p-4 rounded-lg font-bold transition">REGISTRAZIONE/LOGGER</button>
            <button onclick="selectTool('ANALISI')" class="bg-slate-700 hover:bg-emerald-900 p-4 rounded-lg font-bold transition">STATISTICHE/STATS</button>
            <button onclick="selectTool('VIEWER')" class="bg-slate-700 hover:bg-purple-900 p-4 rounded-lg font-bold transition">VISUALIZZATORE/VIEWER</button>
        </div>
    </div>

    <div id="lang-selection" class="hidden-view bg-slate-800 border border-slate-700 rounded-xl p-10 shadow-2xl max-w-md w-full text-center">
        <h2 id="tool-title" class="text-2xl font-bold text-cyan-400 mb-6">Seleziona Lingua</h2>
        <div class="flex gap-4 mb-8">
            <button onclick="navigate('it')" class="flex-1 bg-cyan-600 hover:bg-cyan-700 py-3 rounded-lg font-bold transition">Italiano</button>
            <button onclick="navigate('en')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-bold transition">English</button>
        </div>
        <button onclick="showView('main-menu')" class="text-slate-500 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-sm">Torna indietro / Go back</button>
    </div>

    <script>
        let currentTool = '';
        
        const links = {
            'REGISTRAZIONE': { 'it': 'https://giovanninicoli.github.io/C-C-CARE/', 'en': 'https://giovanninicoli.github.io/CCCARE_ENG/' },
            'ANALISI': { 'it': 'https://giovanninicoli.github.io/STATSCCARE/', 'en': 'https://giovanninicoli.github.io/STATSCCARE' },
            'VIEWER': { 'it': 'https://giovanninicoli.github.io/VIEW/', 'en': 'https://giovanninicoli.github.io/VIEW' }
        };

        // Nomi dei file PDF caricati nella tua repository GitHub
        const pdfLinks = {
            'it': 'https://giovanninicoli.github.io/_CCCARE/manuale_it.pdf', 
            'en': 'https://giovanninicoli.github.io/_CCCARE/manuale_en.pdf'
        };

        function selectTool(tool) {
            currentTool = tool;
            document.getElementById('tool-title').innerText = tool + " - Lingua";
            showView('lang-selection');
        }

        function navigate(lang) {
            // Aggiorna il link del bottone in alto prima di reindirizzare
            document.getElementById('main-btn-manual').href = pdfLinks[lang];
            window.location.href = links[currentTool][lang];
        }

        function showView(viewId) {
            document.getElementById('main-menu').classList.add('hidden-view');
            document.getElementById('lang-selection').classList.add('hidden-view');
            document.getElementById(viewId).classList.remove('hidden-view');
        }
    </script>
</body>
</html>
